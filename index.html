<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Dashboard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      background: #f4f6f9;
    }

    /* Sidebar */
    .sidebar {
      width: 220px;
      height: 100vh;
      background: #2c3e50;
      color: white;
      padding: 20px;
    }

    .sidebar h2 {
      margin-bottom: 20px;
    }

    .sidebar ul {
      list-style: none;
    }

    .sidebar ul li {
      padding: 10px;
      margin: 10px 0;
      cursor: pointer;
      border-radius: 5px;
    }

    .sidebar ul li:hover {
      background: #34495e;
    }

    /* Main Content */
    .main {
      flex: 1;
      padding: 20px;
    }

    /* Header */
    .header {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Cards */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    /* Table */
    table {
      width: 100%;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      border-collapse: collapse;
    }

    table th, table td {
      padding: 12px;
      text-align: left;
    }

    table th {
      background: #2c3e50;
      color: white;
    }

    table tr:nth-child(even) {
      background: #f2f2f2;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Student</h2>
    <ul>
      <li>Dashboard by suraj</li>
      <li>Profile</li>
      <li>Marks</li>
      <li>Attendance</li>
      <li>Settings</li>
    </ul>
  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Header -->
    <div class="header">
      <h2>Dashboard</h2>
      <p>Welcome, Student</p>
    </div>

    <!-- Cards -->
    <div class="cards">
      <div class="card">
        <h3>Total Marks</h3>
        <p>450 / 500</p>
      </div>

      <div class="card">
        <h3>Attendance</h3>
        <p>92%</p>
      </div>

      <div class="card">
        <h3>Assignments</h3>
        <p>5 Pending</p>
      </div>
    </div>

    <!-- Table -->
    <table>
      <tr>
        <th>Subject</th>
        <th>Marks</th>
        <th>Status</th>
      </tr>
      <tr>
        <td>Math</td>
        <td>90</td>
        <td>Pass</td>
      </tr>
      <tr>
        <td>Science</td>
        <td>85</td>
        <td>Pass</td>
      </tr>
      <tr>
        <td>English</td>
        <td>88</td>
        <td>Pass</td>
      </tr>
    </table>

  </div>

</body>
</html>
